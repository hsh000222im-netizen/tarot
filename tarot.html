<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana · 타로 상담</title>
<script>if(location.protocol==='http:' && location.hostname!=='localhost') location.replace('https:'+location.href.substring(5));</script>
<style>
html,body{background:#07060f !important;}
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+KR:wght@300;400;600;700&display=swap');

:root {
  --bg:#07060f; --bg2:#10091f; --gold:#c9a84c; --gold2:#f0d080; --gold3:#ffe9a0;
  --purple:#6a3fa0; --lilac:#c4b0f0; --rose:#d4789a; --text:#e8dfc8; --muted:#7a7060;
  --glow:rgba(201,168,76,0.22); --glow2:rgba(201,168,76,0.45);
  --card-h:140px; --card-w:84px;
}
*{margin:0;padding:0;box-sizing:border-box;} html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;min-height:100vh;overflow-x:hidden;}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.stars span{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) var(--del,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:0.9;transform:scale(1.4);}}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.18;}
.orb1{width:400px;height:400px;background:var(--purple);top:-100px;right:-100px;}
.orb2{width:350px;height:350px;background:#1a2060;bottom:-80px;left:-80px;}
.orb3{width:200px;height:200px;background:#601040;top:50%;left:40%;}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px;}

.logo-wrap{text-align:center;margin-bottom:36px;}
.logo-mark{font-size:1.6rem;letter-spacing:.5em;color:var(--gold);opacity:.7;display:block;margin-bottom:4px;}
.logo-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.12em;display:block;}
.logo-sub{font-size:.72rem;color:var(--muted);letter-spacing:.35em;text-transform:uppercase;margin-top:6px;display:block;}

.sec-title{font-family:'Cinzel Decorative',serif;font-size:.85rem;color:var(--gold);letter-spacing:.18em;text-align:center;margin-bottom:18px;display:flex;align-items:center;gap:10px;width:100%;max-width:640px;}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.35),transparent);}

.panel{background:rgba(16,9,31,.7);border:1px solid rgba(201,168,76,.18);border-radius:16px;padding:28px 24px;width:100%;max-width:640px;backdrop-filter:blur(12px);margin-bottom:20px;}

/* deck */
.deck-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
.deck-opt{flex:1 1 140px;max-width:170px;border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;background:rgba(255,255,255,.03);transition:all .25s;position:relative;overflow:hidden;}
.deck-opt:hover{border-color:rgba(201,168,76,.55);transform:translateY(-3px);}
.deck-opt.active{border-color:var(--gold2);box-shadow:0 0 0 1px var(--gold2),0 6px 24px var(--glow2);background:rgba(201,168,76,.06);}
.deck-icon{font-size:2rem;display:block;margin-bottom:8px;}
.deck-name{font-family:'Cinzel Decorative',serif;font-size:.68rem;color:var(--gold);letter-spacing:.05em;display:block;}
.deck-cnt{font-size:.65rem;color:var(--muted);margin-top:3px;display:block;}

/* shuffle builder */
.shuffle-builder{width:100%;max-width:640px;}
.shuffle-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:12px 16px;margin-bottom:10px;}
.shuffle-label{font-family:'Cinzel Decorative',serif;font-size:.72rem;color:var(--gold);min-width:70px;}
.shuffle-input{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.9rem;width:80px;outline:none;text-align:center;}
.shuffle-input:focus{border-color:var(--gold);}
.shuffle-desc{font-size:.72rem;color:var(--muted);flex:1;}
.shuffle-del{background:none;border:1px solid rgba(224,112,112,.3);border-radius:6px;padding:5px 10px;color:#e07070;cursor:pointer;font-size:.75rem;transition:all .2s;}
.shuffle-del:hover{background:rgba(224,112,112,.1);}
.add-shuffle-btn{background:rgba(201,168,76,.08);border:1px dashed rgba(201,168,76,.3);border-radius:10px;padding:12px;width:100%;color:var(--gold);font-size:.82rem;cursor:pointer;transition:all .2s;margin-bottom:16px;}
.add-shuffle-btn:hover{background:rgba(201,168,76,.15);}

/* link box */
.link-box{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:12px 16px;width:100%;}
.link-url{flex:1;font-size:.78rem;color:var(--lilac);word-break:break-all;line-height:1.5;font-family:'Courier New',monospace;}
.copy-btn{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);border-radius:8px;padding:8px 16px;color:var(--gold2);cursor:pointer;font-size:.78rem;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.copy-btn:hover{background:rgba(201,168,76,.28);}
.copy-btn.copied{background:rgba(80,200,80,.15);border-color:rgba(80,200,80,.4);color:#a0e8a0;}

/* buttons */
.btn{background:linear-gradient(135deg,#6b4500,var(--gold),#6b4500);border:none;border-radius:10px;padding:14px 36px;color:#07060f;font-family:'Cinzel Decorative',serif;font-size:.85rem;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px var(--glow);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow2);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,.35);border-radius:10px;padding:10px 24px;color:var(--gold);font-size:.8rem;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,.08);}

/* card board */
.board-meta{text-align:center;margin-bottom:16px;}
.board-deck{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold2);margin-bottom:4px;}
.board-spread{font-size:.78rem;color:var(--muted);}
.shuffle-progress{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.progress-dot{width:28px;height:6px;border-radius:3px;background:rgba(201,168,76,.2);transition:all .3s;}
.progress-dot.done{background:var(--gold);}
.progress-dot.active{background:var(--gold2);box-shadow:0 0 8px var(--glow2);}

.pick-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:24px;padding:7px 22px;font-size:.82rem;color:var(--gold2);margin-bottom:20px;}
.pick-pip{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block;}

/* ── 카드 펼치기 레이아웃 ── */
.cards-sea{
  width:100%;max-width:860px;
  padding:10px 16px 20px;
  display:flex;
  flex-direction:column;
  gap:0;
}
.card-row{
  position:relative;
  height:130px;
  width:100%;
  margin-bottom:16px;
}
@media(min-width:500px){ .card-row{height:150px;} }
@media(min-width:700px){ .card-row{height:170px;} }

/* tarot card */
.tc{
  position:absolute;
  width:64px; height:106px;
  perspective:700px;
  cursor:pointer;
  transition:transform .15s, z-index 0s;
}
@media(min-width:500px){ .tc{width:74px;height:122px;} }
@media(min-width:700px){ .tc{width:84px;height:140px;} }

.tc:not(.flipped):not(.disabled):hover{
  transform:translateY(-14px) scale(1.06) !important;
  z-index:200 !important;
}
.tc.flipped{
  transform:translateY(-18px) scale(1.08) !important;
  z-index:300 !important;
}

.tc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);border-radius:9px;}
.tc.flipped .tc-inner{transform:rotateY(180deg);}
.tc-face{position:absolute;inset:0;border-radius:9px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.tc-back{background:linear-gradient(160deg,#1a1035,#0f0823);border:1px solid rgba(201,168,76,.28);box-shadow:0 2px 12px rgba(0,0,0,.6);}
.tc-back-inner{position:absolute;inset:5px;border-radius:6px;border:1px solid rgba(201,168,76,.12);background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(201,168,76,.03) 5px,rgba(201,168,76,.03) 6px),repeating-linear-gradient(-45deg,transparent,transparent 5px,rgba(106,63,160,.05) 5px,rgba(106,63,160,.05) 6px);}
.tc-back-star{position:relative;z-index:1;font-size:1.3rem;color:rgba(201,168,76,.45);}
.tc:not(.flipped):not(.disabled):hover .tc-back{border-color:var(--gold2);box-shadow:0 0 18px var(--glow2),0 2px 12px rgba(0,0,0,.6);}
.tc.disabled:not(.flipped) .tc-back{opacity:.35;cursor:default;}
.tc-front{transform:rotateY(180deg);background:linear-gradient(160deg,#231640,#1a0d35);border:1px solid var(--gold);box-shadow:0 0 22px var(--glow),0 2px 10px rgba(0,0,0,.5);gap:3px;}
.tc-order{position:absolute;top:5px;left:0;right:0;text-align:center;font-size:.5rem;color:var(--gold);font-family:'Cinzel Decorative',serif;}
.tc-sym{font-size:1.9rem;} .tc-num{font-size:.5rem;color:var(--gold2);font-family:'Cinzel Decorative',serif;}
.tc-label{font-size:.42rem;color:var(--lilac);text-align:center;padding:0 5px;line-height:1.3;}

/* result */
.result-item{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:18px;margin-bottom:12px;}
.result-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.result-name{font-size:.9rem;color:var(--gold2);font-weight:600;}
.result-time{font-size:.68rem;color:var(--muted);}
.result-row{font-size:.75rem;color:var(--muted);margin-bottom:4px;}
.result-row span{color:var(--text);}
.shuffle-section{margin-top:10px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:2px solid rgba(201,168,76,.3);margin-bottom:6px;}
.shuffle-section-title{font-size:.72rem;color:var(--gold);margin-bottom:6px;font-family:'Cinzel Decorative',serif;}
.cards-chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:rgba(106,63,160,.2);border:1px solid rgba(196,176,240,.2);border-radius:6px;padding:4px 10px;font-size:.7rem;color:var(--lilac);}
.badge-new{background:rgba(212,120,154,.2);border:1px solid rgba(212,120,154,.4);border-radius:4px;padding:2px 8px;font-size:.62rem;color:var(--rose);}
.no-result{text-align:center;color:var(--muted);padding:32px;font-size:.85rem;}

/* done */
.done-box{text-align:center;background:rgba(16,9,31,.8);border:1px solid var(--gold);border-radius:18px;padding:40px 28px;max-width:540px;width:100%;box-shadow:0 0 50px var(--glow);}
.done-icon{font-size:3.5rem;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.done-title{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold2);margin-bottom:8px;}
.done-msg{font-size:.82rem;color:var(--muted);line-height:1.9;margin-bottom:20px;}
.done-shuffle-block{text-align:left;background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:14px 16px;margin-bottom:10px;width:100%;}
.done-shuffle-title{font-size:.75rem;color:var(--gold);font-family:'Cinzel Decorative',serif;margin-bottom:8px;}
.done-chips{display:flex;flex-wrap:wrap;gap:6px;}
.done-chip{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:5px 12px;font-size:.73rem;color:var(--gold);}

/* pw */
.pw-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;padding:20px;}
.pw-overlay.open{display:flex;}
.pw-box{background:var(--bg2);border:1px solid var(--gold);border-radius:16px;padding:32px;max-width:320px;width:100%;text-align:center;}
.pw-box h3{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:.9rem;margin-bottom:18px;}
.pw-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:12px;color:var(--text);font-size:1rem;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:12px;}
.pw-err{font-size:.72rem;color:#e07070;margin-bottom:10px;display:none;}
.pw-row{display:flex;gap:8px;justify-content:center;}
.pw-row button{background:none;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:9px 20px;color:var(--text);cursor:pointer;font-size:.8rem;transition:all .2s;}
.pw-row .pw-ok{background:rgba(201,168,76,.15);color:var(--gold2);border-color:rgba(201,168,76,.35);}

.admin-fab{position:fixed;bottom:20px;right:20px;z-index:200;background:rgba(16,9,31,.9);border:1px solid rgba(201,168,76,.3);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;}
.admin-fab:hover{border-color:var(--gold);}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .5s ease both;}
.d1{animation-delay:.05s;}.d2{animation-delay:.1s;}.d3{animation-delay:.15s;}.d4{animation-delay:.2s;}

input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:1;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>

<!-- ══════ ADMIN PAGE ══════ -->
<div class="page" id="adminPage" style="display:none">
  <div id="adminSetup">
    <div class="logo-wrap fade-up">
      <span class="logo-mark">✦ ✦ ✦</span>
      <span class="logo-title">Arcana</span>
      <span class="logo-sub">관리자 · 덱 설정</span>
    </div>

    <div class="panel fade-up d1">
      <div class="sec-title">덱 선택</div>
      <div class="deck-grid" id="adminDeckGrid">
        <div class="deck-opt" data-deck="rws"><span class="deck-icon">🌟</span><span class="deck-name">Rider-Waite</span><span class="deck-cnt">78장</span></div>
        <div class="deck-opt" data-deck="osho"><span class="deck-icon">🌸</span><span class="deck-name">Osho Zen</span><span class="deck-cnt">79장</span></div>
        <div class="deck-opt" data-deck="thoth"><span class="deck-icon">🔮</span><span class="deck-name">Thoth</span><span class="deck-cnt">78장</span></div>
        <div class="deck-opt" data-deck="oracle"><span class="deck-icon">🌙</span><span class="deck-name">Moon Oracle</span><span class="deck-cnt">44장</span></div>
      </div>
    </div>

    <div class="panel fade-up d2" id="shufflePanel" style="display:none">
      <div class="sec-title">셔플 설정</div>
      <div id="shuffleRows"></div>
      <button class="add-shuffle-btn" id="btnAddShuffle">+ 셔플 추가 (최대 10개)</button>
    </div>

    <div class="panel fade-up d3" id="linkPanel" style="display:none">
      <div class="sec-title">내담자 정보</div>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <div style="flex:1;min-width:160px;">
          <label style="font-size:.72rem;color:var(--gold);letter-spacing:.1em;display:block;margin-bottom:6px;">내담자 이름 ✦ 필수</label>
          <input type="text" id="clientNameInput" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.84rem;outline:none;" placeholder="예: 김지수">
        </div>
      </div>
      <div class="sec-title">생성된 링크</div>
      <div id="linkWaiting" style="font-size:.75rem;color:var(--muted);text-align:center;padding:12px 0;">✦ 위에 이름을 입력하면 링크가 생성됩니다</div>
      <div class="link-box" id="linkBox" style="display:none;">
        <span class="link-url" id="generatedLink">—</span>
        <button class="copy-btn" id="copyBtn">복사</button>
      </div>
      <p id="linkHint" style="font-size:.7rem;color:var(--muted);margin-top:10px;text-align:center;display:none;">이 링크를 해당 내담자에게만 전달하세요.</p>
    </div>

    <button class="btn fade-up d4" id="btnGenLink" disabled style="margin-bottom:24px;">링크 생성 ✦</button>
  </div>

  <div id="adminResults" style="display:none">
    <div class="logo-wrap fade-up">
      <span class="logo-mark">✦ ✦ ✦</span>
      <span class="logo-title">Arcana</span>
      <span class="logo-sub">관리자 · 상담 결과</span>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;" class="fade-up">
      <button class="btn-outline" id="btnToSetup">← 덱 설정으로</button>
      <button class="btn-outline" id="btnRefresh" style="margin-left:auto;">새로고침</button>
      <button class="btn-outline" id="btnClearAll" style="color:#e07070;border-color:rgba(224,112,112,.35);">전체 삭제</button>
    </div>
    <div id="resultsList" style="width:100%;max-width:640px;"></div>
  </div>
</div>

<!-- ══════ CLIENT PAGE ══════ -->
<div class="page" id="clientPage" style="display:none">
  <div id="clientPick">
    <div class="logo-wrap fade-up">
      <span class="logo-mark">✦ ✦ ✦</span>
      <span class="logo-title">Arcana</span>
      <span class="logo-sub">타로 카드 선택</span>
    </div>
    <div class="board-meta fade-up">
      <div class="board-deck" id="clientDeckName">—</div>
      <div class="board-spread" id="clientSpreadName">—</div>
    </div>
    <div id="clientQuestion" style="
      width:100%;max-width:640px;
      background:rgba(201,168,76,.07);
      border:1px solid rgba(201,168,76,.25);
      border-radius:12px;padding:14px 20px;
      font-size:.88rem;color:var(--gold2);
      text-align:center;line-height:1.7;
      margin-bottom:16px;display:none;
    "></div>
    <div class="shuffle-progress fade-up d1" id="shuffleProgress"></div>
    <div class="pick-pill fade-up d2">
      <span class="pick-pip"></span>
      <span id="pickStatus">0 / 0 장 선택됨</span>
    </div>
    <p style="font-size:.75rem;color:var(--muted);margin-bottom:22px;text-align:center;" class="fade-up d2">마음이 끌리는 카드를 클릭해서 선택하세요</p>
    <div class="cards-sea" id="cardsSea"></div>
    <button class="btn fade-up" id="btnNext" disabled style="margin-top:32px;">다음 ✦</button>
  </div>

  <div id="clientDone" style="display:none">
    <div class="done-box fade-up">
      <span class="done-icon">✨</span>
      <div class="done-title" id="doneName">카드 선택 완료</div>
      <p class="done-msg">선택하신 카드가 전달되었습니다.</p>
      <div id="doneShuffles" style="width:100%;"></div>
    </div>
  </div>
</div>

<button class="admin-fab" id="adminFab" title="관리자" style="display:none">🔮</button>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h3>관리자 확인</h3>
    <input class="pw-input" type="password" id="pwInput" placeholder="비밀번호">
    <div class="pw-err" id="pwErr">비밀번호가 틀렸습니다</div>
    <div class="pw-row">
      <button id="btnPwCancel">취소</button>
      <button class="pw-ok" id="btnPwOk">확인</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, orderBy, query, deleteDoc, doc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ══════════════════════════════════════
   ADMIN
══════════════════════════════════════ */
let adminState = { deck: null };
let shuffleCount = 0;

function initAdmin(){
  document.querySelectorAll('#adminDeckGrid .deck-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('#adminDeckGrid .deck-opt').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      adminState.deck = el.dataset.deck;
      // show shuffle panel and add first row if empty
      document.getElementById('shufflePanel').style.display='block';
      if(shuffleCount === 0) addShuffleRow();
      checkAdminReady();
    });
  });
}

function addShuffleRow(){
  if(shuffleCount >= 10) return;
  shuffleCount++;
  const idx = shuffleCount;
  const row = document.createElement('div');
  row.className = 'shuffle-row';
  row.id = `shuffleRow${idx}`;
  row.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;flex:1;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="shuffle-label">${idx}번 셔플</span>
        <input class="shuffle-input" type="number" id="shuffleInput${idx}" min="1" max="15" value="3" placeholder="장 수">
        <span class="shuffle-desc">장 뽑기</span>
        ${idx > 1 ? `<button class="shuffle-del" data-idx="${idx}">삭제</button>` : ''}
      </div>
      <input type="text" id="shuffleQuestion${idx}"
        style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.8rem;outline:none;"
        placeholder="질문 입력 (예: 현재 상황을 나타내는 카드)">
    </div>
  `;
  document.getElementById('shuffleRows').appendChild(row);
  row.querySelector(`#shuffleInput${idx}`).addEventListener('input', generateLink);
  row.querySelector(`#shuffleQuestion${idx}`).addEventListener('input', generateLink);
  const delBtn = row.querySelector('.shuffle-del');
  if(delBtn) delBtn.addEventListener('click', ()=>removeShuffleRow(idx));
  document.getElementById('linkPanel').style.display='block';
  generateLink();
}

function removeShuffleRow(idx){
  document.getElementById(`shuffleRow${idx}`)?.remove();
  shuffleCount--;
  const rows = document.querySelectorAll('.shuffle-row');
  rows.forEach((r,i)=>{
    const num = i+1;
    r.id = `shuffleRow${num}`;
    r.querySelector('.shuffle-label').textContent = `${num}번 셔플`;
    const inp = r.querySelector('.shuffle-input');
    if(inp) inp.id = `shuffleInput${num}`;
    const qInp = r.querySelector('input[type=text]');
    if(qInp) qInp.id = `shuffleQuestion${num}`;
    const del = r.querySelector('.shuffle-del');
    if(del) del.dataset.idx = num;
    if(num === 1 && del) del.remove();
  });
  shuffleCount = rows.length;
  generateLink();
}

function getShuffleValues(){
  const vals = [];
  for(let i=1;i<=shuffleCount;i++){
    const inp = document.getElementById(`shuffleInput${i}`);
    const qInp = document.getElementById(`shuffleQuestion${i}`);
    if(inp){
      const v = Math.min(15, Math.max(1, parseInt(inp.value)||1));
      const q = qInp ? qInp.value.trim() : '';
      vals.push({count: v, question: q});
    }
  }
  return vals;
}

function generateLink(){
  if(!adminState.deck) return;
  const name = document.getElementById('clientNameInput').value.trim();
  const shuffles = getShuffleValues();
  if(!shuffles.length) return;

  const base = location.origin + location.pathname;
  // encode: counts="5,3" questions="현재상황,미래"
  const counts = shuffles.map(s=>s.count).join(',');
  const questions = shuffles.map(s=>encodeURIComponent(s.question||'')).join('|');
  let url = `${base}?deck=${adminState.deck}&shuffles=${counts}&questions=${questions}&name=${encodeURIComponent(name||'내담자')}`;

  document.getElementById('generatedLink').textContent = url;
  document.getElementById('linkWaiting').style.display = name ? 'none' : '';
  document.getElementById('linkBox').style.display = name ? 'flex' : 'none';
  document.getElementById('linkHint').style.display = name ? 'block' : 'none';
}

function copyLink(){
  const url = document.getElementById('generatedLink').textContent;
  navigator.clipboard.writeText(url).then(()=>{
    const btn = document.getElementById('copyBtn');
    btn.textContent='복사됨 ✓'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='복사'; btn.classList.remove('copied'); }, 2000);
  });
}

function showAdminSetup(){
  document.getElementById('adminSetup').style.display='';
  document.getElementById('adminResults').style.display='none';
}

function showAdminResults(){
  document.getElementById('adminSetup').style.display='none';

async function loadResults(){
  const el = document.getElementById('resultsList');
  el.innerHTML = '<div class="no-result">불러오는 중... ✦</div>';
  try {
    const q = query(collection(db,'readings'), orderBy('id','desc'));
    const snap = await getDocs(q);
    if(snap.empty){ el.innerHTML='<div class="no-result">아직 상담 신청 내역이 없습니다 ✦</div>'; return; }
    el.innerHTML = snap.docs.map((d,i)=>{
      const r = d.data();
      const shuffleBlocks = (r.shuffles||[]).map((sh,si)=>`
        <div class="shuffle-section">
          <div class="shuffle-section-title">${si+1}번 셔플 (${sh.count}장)${sh.question ? ` · ${sh.question}` : ''}</div>
          <div class="cards-chips">${sh.cards.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
        </div>`).join('');
      return `
        <div class="result-item">
          <div class="result-item-head">
            <span class="result-name">👤 ${r.clientName}</span>
            ${i===0?'<span class="badge-new">NEW</span>':''}
          </div>
          <div class="result-row">📅 <span>${r.datetime}</span></div>
          <div class="result-row">🃏 <span>${r.deckName}</span></div>
          ${shuffleBlocks}
        </div>`;
    }).join('');
  } catch(e){
    el.innerHTML = '<div class="no-result">불러오기 실패: '+e.message+'</div>';
  }
}

async function clearAll(){
  if(confirm('모든 신청 내역을 삭제하시겠습니까?')){
    const snap = await getDocs(collection(db,'readings'));
    await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'readings',d.id))));
    loadResults();
  }
}

/* ══════════════════════════════════════
   CLIENT
══════════════════════════════════════ */
let currentShuffle = 0;   // 0-based index
let allResults     = [];  // [{count, cards:[]}]
let picked         = [];

function initClient(){
  const deck = DECKS[CLIENT_DECK];
  if(!deck){ document.getElementById('clientPick').innerHTML='<p style="color:var(--muted);text-align:center;">잘못된 링크입니다.</p>'; return; }
  document.getElementById('clientDeckName').textContent = `${deck.icon} ${deck.name}`;
  buildProgressDots();
  loadShuffle(0);

  document.getElementById('btnNext').addEventListener('click', async ()=>{
    // save current shuffle result
    allResults.push({
      count: CLIENT_SHUFFLES[currentShuffle],
      question: CLIENT_QUESTIONS[currentShuffle] || '',
      cards: picked.map(c=>`${c.order}번째 · ${c.s} ${c.l}`)
    });

    if(currentShuffle < CLIENT_SHUFFLES.length - 1){
      // next shuffle
      currentShuffle++;
      picked = [];
      document.getElementById('btnNext').disabled = true;
      loadShuffle(currentShuffle);
    } else {
      // all done → save & show done screen
      const rec = {
        id: Date.now(),
        datetime: new Date().toLocaleString('ko-KR'),
        clientName: CLIENT_NAME || '(이름 없음)',
        deckName: deck.name,
        shuffles: allResults,
      };
      try { await addDoc(collection(db,'readings'), rec); }
      catch(e){ console.error('저장 실패:', e); }
      showDone();
    }
  });
}

function buildProgressDots(){
  const el = document.getElementById('shuffleProgress');
  el.innerHTML = CLIENT_SHUFFLES.map((_,i)=>`<div class="progress-dot ${i===0?'active':''}" id="dot${i}"></div>`).join('');
}

function updateProgressDots(){
  CLIENT_SHUFFLES.forEach((_,i)=>{
    const dot = document.getElementById(`dot${i}`);
    if(!dot) return;
    dot.className = 'progress-dot';
    if(i < currentShuffle) dot.classList.add('done');
    else if(i === currentShuffle) dot.classList.add('active');
  });
}

function loadShuffle(idx){
  const count = CLIENT_SHUFFLES[idx];
  const isLast = idx === CLIENT_SHUFFLES.length - 1;
  const question = CLIENT_QUESTIONS[idx] || '';

  document.getElementById('clientSpreadName').textContent =
    `${idx+1}번째 셔플 · ${count}장 선택 (총 ${CLIENT_SHUFFLES.length}번 셔플)`;

  const qEl = document.getElementById('clientQuestion');
  if(question){
    qEl.textContent = `✦ ${question}`;
    qEl.style.display = 'block';
  } else {
    qEl.style.display = 'none';
  }

  document.getElementById('pickStatus').textContent = `0 / ${count} 장 선택됨`;
  document.getElementById('btnNext').textContent = isLast ? '선택 완료 ✦' : `다음 셔플로 →`;
  updateProgressDots();
  buildCards(DECKS[CLIENT_DECK], count);
}

function buildCards(deck, count){
  const shuffled = [...deck.cards].sort(()=>Math.random()-.5);
  const sea = document.getElementById('cardsSea');
  sea.innerHTML = '';

  const total = shuffled.length;
  const ROWS = 3;
  const perRow = Math.ceil(total / ROWS);

  for(let r=0; r<ROWS; r++){
    const rowEl = document.createElement('div');
    rowEl.className = 'card-row';
    sea.appendChild(rowEl);

    const rowCards = shuffled.slice(r*perRow, (r+1)*perRow);
    const cardW = window.innerWidth >= 700 ? 84 : window.innerWidth >= 500 ? 74 : 64;
    const rowWidth = sea.offsetWidth || window.innerWidth - 32;
    // 간격을 넓혀서 전체 카드가 rowWidth에 맞게
    const totalSpan = rowWidth - cardW;
    const overlap = totalSpan / Math.max(rowCards.length - 1, 1);

    // 전체 너비 계산 후 중앙 정렬
    const totalW = cardW + overlap * (rowCards.length - 1);
    const startX = Math.max(0, (rowWidth - totalW) / 2);

    rowCards.forEach((card, ci)=>{
      const globalIdx = r*perRow + ci;
      const el = document.createElement('div');
      el.className = 'tc';
      el.style.left = `${startX + ci * overlap}px`;
      el.style.zIndex = ci;
      el.style.top = '0';
      el.innerHTML = `
        <div class="tc-inner">
          <div class="tc-face tc-back"><div class="tc-back-inner"></div><span class="tc-back-star">✦</span></div>
          <div class="tc-face tc-front">
            <span class="tc-order" id="order-${globalIdx}"></span>
            <span class="tc-sym">${card.s}</span>
            <span class="tc-num">${card.n}</span>
            <span class="tc-label">${card.l}</span>
          </div>
        </div>`;
      el.addEventListener('click', ()=>{
        if(el.classList.contains('flipped')||el.classList.contains('disabled')) return;
        if(picked.length >= count) return;
        const order = picked.length + 1;
        picked.push({...card, order});
        el.classList.add('flipped');
        document.getElementById(`order-${globalIdx}`).textContent = order+'번째';
        document.getElementById('pickStatus').textContent = `${picked.length} / ${count} 장 선택됨`;
        if(picked.length >= count){
          document.querySelectorAll('.tc:not(.flipped)').forEach(c=>c.classList.add('disabled'));
          document.getElementById('btnNext').disabled = false;
        }
      });
      rowEl.appendChild(el);
    });
  }
}

function showDone(){
  const doneTitle = document.getElementById('doneName');
  doneTitle.textContent = CLIENT_NAME ? `${CLIENT_NAME}님, 선택 완료!` : '카드 선택 완료';

  const doneShuffles = document.getElementById('doneShuffles');
  doneShuffles.innerHTML = allResults.map((sh,i)=>`
    <div class="done-shuffle-block">
      <div class="done-shuffle-title">${i+1}번 셔플 · ${sh.count}장${sh.question ? `<br><span style="font-size:.7rem;color:var(--muted);font-family:'Noto Serif KR',serif;font-weight:400;">${sh.question}</span>` : ''}</div>
      <div class="done-chips">${sh.cards.map(c=>`<span class="done-chip">${c}</span>`).join('')}</div>
    </div>`).join('');

  document.getElementById('clientPick').style.display='none';
  document.getElementById('clientDone').style.display='flex';
  document.getElementById('clientDone').style.flexDirection='column';
  document.getElementById('clientDone').style.alignItems='center';
  window.scrollTo(0,0);
}

    location.reload();

    document.body.appendChild(rb);
