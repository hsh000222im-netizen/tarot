<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heet Signal · 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08070f;--bg2:#0f0d1c;
  --gold:#c8a456;--gold2:#e8c87a;
  --text:#e2d8c8;--text2:#b8ad9a;--text3:#7a7268;
  --border:rgba(200,164,86,.18);--border2:rgba(200,164,86,.38);
  --glow:rgba(200,164,86,.14);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;min-height:100vh;font-weight:300;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(100,80,160,.07),transparent 55%);pointer-events:none;z-index:0;}

/* PW */
.pw-screen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
.pw-box{max-width:300px;width:100%;text-align:center;}
.pw-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold2);letter-spacing:.2em;margin-bottom:6px;}
.pw-sub{font-size:.65rem;color:var(--text3);letter-spacing:.35em;text-transform:uppercase;margin-bottom:28px;}
.pw-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;padding:12px 16px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.9rem;outline:none;text-align:center;letter-spacing:.15em;margin-bottom:10px;}
.pw-input:focus{border-color:var(--gold);}
.pw-err{font-size:.72rem;color:#e08080;margin-bottom:10px;display:none;}
.pw-btn{width:100%;background:linear-gradient(135deg,#7a5810,var(--gold),#7a5810);border:none;border-radius:9px;padding:12px;color:#08070f;font-family:'Noto Serif KR',serif;font-size:.88rem;font-weight:600;cursor:pointer;}

/* WRAP */
.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:36px 20px 80px;display:none;}
.admin-header{text-align:center;margin-bottom:32px;}
.admin-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold2);letter-spacing:.15em;display:block;margin-bottom:4px;}
.admin-sub{font-size:.65rem;color:var(--text3);letter-spacing:.3em;text-transform:uppercase;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:26px;}
.tab{padding:10px 20px;cursor:pointer;font-size:.8rem;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* LABEL */
.plabel{font-size:.62rem;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.plabel::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* DATE SECTION */
.date-section{background:rgba(15,13,28,.7);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.date-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.date-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold2);}
.close-btn{background:rgba(220,80,80,.1);border:1px solid rgba(220,80,80,.3);border-radius:7px;padding:6px 14px;color:#e08080;cursor:pointer;font-size:.72rem;transition:all .2s;}
.close-btn:hover{background:rgba(220,80,80,.2);}
.close-btn.closed{background:rgba(80,200,120,.1);border-color:rgba(80,200,120,.3);color:#80e0a0;}

/* TIME INPUT ROW */
.time-gen-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
.time-gen-row label{font-size:.7rem;color:var(--text3);}
.tginput{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.85rem;outline:none;width:82px;text-align:center;}
.tginput:focus{border-color:var(--gold);}
.tgbtn{background:rgba(200,164,86,.12);border:1px solid rgba(200,164,86,.35);border-radius:7px;padding:7px 16px;color:var(--gold2);cursor:pointer;font-size:.76rem;font-family:'Noto Serif KR',serif;transition:all .2s;white-space:nowrap;}
.tgbtn:hover{background:rgba(200,164,86,.22);}

/* SLOT GRID */
.slot-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px;}
.slot-item{border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:.76rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.02);}
.slot-item .st{color:var(--text2);}
.slot-item .sb{font-size:.56rem;padding:2px 5px;border-radius:3px;}
.s-open{border-color:rgba(80,200,120,.3);background:rgba(80,200,120,.06);}
.s-open .st{color:#a0e0b0;}
.s-open .sb{background:rgba(80,200,120,.12);color:#80e0a0;}
.s-locked{border-color:rgba(220,80,80,.25);background:rgba(220,80,80,.05);}
.s-locked .st{color:#e0a0a0;text-decoration:line-through;}
.s-locked .sb{background:rgba(220,80,80,.1);color:#e08080;}
.s-taken{border-color:rgba(180,140,60,.35);background:rgba(180,140,60,.07);}
.s-taken .st{color:var(--gold);}
.s-taken .sb{background:rgba(180,140,60,.12);color:var(--gold2);}
.s-blocked{border-color:rgba(180,120,220,.25);background:rgba(180,120,220,.05);}
.s-blocked .st{color:#c0a0e0;text-decoration:line-through;}
.s-blocked .sb{background:rgba(180,120,220,.1);color:#c0a0e0;}
.no-slots{font-size:.74rem;color:var(--text3);padding:12px;text-align:center;border:1px dashed var(--border);border-radius:7px;margin-bottom:6px;}
.del-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.72rem;padding:0 2px;line-height:1;}
.del-x:hover{color:#e08080;}

/* BOOKING SECTIONS */
.bk-section{margin-bottom:28px;}
.bk-section-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold2);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.bk-date-group{margin-bottom:18px;}
.bk-date-label{font-size:.7rem;color:var(--gold);letter-spacing:.15em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.bk-date-label::after{content:'';flex:1;height:1px;background:var(--border);}
.bk-item{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;background:rgba(15,13,28,.6);}
.bk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.bk-time-badge{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold2);}
.bk-name{font-size:.88rem;color:var(--text);}
.bk-min{font-size:.72rem;color:var(--text3);}
.bk-form-toggle{display:flex;align-items:center;gap:10px;margin-top:8px;}
.toggle-label{font-size:.72rem;color:var(--text3);}
.toggle-btn{border:1px solid var(--border);border-radius:6px;padding:5px 14px;cursor:pointer;font-size:.72rem;font-family:'Noto Serif KR',serif;transition:all .2s;background:transparent;color:var(--text3);}
.toggle-btn.recv{border-color:rgba(80,200,120,.4);background:rgba(80,200,120,.1);color:#80e0a0;}
.toggle-btn.not-recv{border-color:rgba(220,80,80,.3);background:rgba(220,80,80,.07);color:#e08080;}

/* OTHER BOOKING */
.bk-other{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;background:rgba(15,13,28,.6);}
.bko-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.bko-name{font-size:.88rem;color:var(--text);}
.bko-menu{font-size:.72rem;color:var(--gold);background:rgba(200,164,86,.08);border:1px solid rgba(200,164,86,.2);border-radius:4px;padding:2px 8px;}
.bko-price{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold2);}
.bko-recv-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.bko-recv-label{font-size:.7rem;color:var(--text3);}
.bko-recv-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.78rem;outline:none;width:160px;}
.bko-recv-input:focus{border-color:var(--gold);}
.bko-deadline{font-size:.76rem;padding:5px 12px;border-radius:6px;border:1px solid rgba(200,164,86,.25);background:rgba(200,164,86,.07);color:var(--gold2);}
.bk-del{background:none;border:1px solid rgba(220,80,80,.2);border-radius:6px;padding:3px 10px;color:#e08080;cursor:pointer;font-size:.68rem;transition:all .2s;}
.bk-del:hover{background:rgba(220,80,80,.1);}
.no-data{text-align:center;color:var(--text3);padding:24px;font-size:.78rem;border:1px dashed var(--border);border-radius:9px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(80,200,120,.15);border:1px solid rgba(80,200,120,.35);border-radius:8px;padding:9px 22px;font-size:.76rem;color:#a0e0b0;display:none;z-index:999;white-space:nowrap;}
</style>
</head>
<body>

<!-- PW -->
<div class="pw-screen" id="pwScreen">
  <div class="pw-box">
    <div class="pw-title">Heet Signal</div>
    <div class="pw-sub">Admin Access</div>
    <input class="pw-input" type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-err" id="pwErr">비밀번호가 틀렸습니다</div>
    <button class="pw-btn" onclick="checkPw()">로그인</button>
  </div>
</div>

<!-- ADMIN -->
<div class="wrap" id="adminWrap">
  <div class="admin-header">
    <span class="admin-title">관리자 페이지</span>
    <span class="admin-sub">Heet Signal · Tarot</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('slots')">시간 관리</div>
    <div class="tab" onclick="switchTab('bookings')">예약 내역</div>
  </div>

  <!-- 시간 관리 -->
  <div class="tab-panel active" id="tab-slots">
    <div class="plabel">날짜별 시간 설정</div>
    <div id="dayPanels"></div>
  </div>

  <!-- 예약 내역 -->
  <div class="tab-panel" id="tab-bookings">
    <!-- 실시간 상담 -->
    <div class="bk-section">
      <div class="bk-section-title">📡 실시간 상담</div>
      <div id="rtBookings"></div>
    </div>
    <!-- 그 외 메뉴 -->
    <div class="bk-section">
      <div class="bk-section-title">📋 그 외 메뉴</div>
      <div id="otherBookings"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PW = '040224';
const MENU_DEADLINE = { question:24, mixed:24, solo:48, reunion:48, weekly:168 };
const MENU_NAMES = { realtime:'실시간 리딩', question:'질문제 리딩', mixed:'혼합 리딩', solo:'솔로 패키지', reunion:'재회 패키지', weekly:'위클리 패키지' };

function ad(){ try{ return JSON.parse(localStorage.getItem('hs_admin')||'{}'); } catch(e){ return {}; } }
function sad(d){ localStorage.setItem('hs_admin', JSON.stringify(d)); }

// ── 로그인 ──
function checkPw(){
  if(document.getElementById('pwInput').value === ADMIN_PW){
    document.getElementById('pwScreen').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    renderDays();
  } else {
    document.getElementById('pwErr').style.display='block';
  }
}

// ── 탭 ──
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['slots','bookings'][i]===t));
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='bookings') renderBookings();
}

// ── 날짜 유틸 ──
function getDates(){
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  return [
    { label:'오늘', date:today, key:fmtKey(today) },
    { label:'내일', date:tomorrow, key:fmtKey(tomorrow) },
  ];
}
function fmtKey(d){ return d.toISOString().split('T')[0]; }
function fmtLabel(d){ return `${d.getMonth()+1}/${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`; }

// ── 시간 관리 렌더 ──
function renderDays(){
  const data = ad();
  const container = document.getElementById('dayPanels');
  container.innerHTML = '';
  getDates().forEach(({label,date,key})=>{
    const slots = data.slots?.[key] || [];
    const locked = data.locked || {};
    const bookings = data.bookings || {};
    const isClosed = data.closedDays?.[key] || false;

    const div = document.createElement('div');
    div.className = 'date-section';
    div.innerHTML = `
      <div class="date-header">
        <span class="date-title">${label} · ${fmtLabel(date)}</span>
        <button class="close-btn ${isClosed?'closed':''}" onclick="toggleClose('${key}')">${isClosed?'✓ 마감 (클릭하여 열기)':'하루 전체 마감'}</button>
      </div>
      <div class="time-gen-row">
        <label>시작</label>
        <input class="tginput" type="text" id="gs-${key}" placeholder="15:00" maxlength="5">
        <label>종료</label>
        <input class="tginput" type="text" id="ge-${key}" placeholder="24:00" maxlength="5">
        <button class="tgbtn" onclick="genSlots('${key}')">30분 단위 생성</button>
      </div>
      <div class="slot-grid" id="sg-${key}"></div>
    `;
    container.appendChild(div);
    renderSlots(key, slots, locked, bookings);
  });
}

function renderSlots(key, slots, locked, bookings){
  const grid = document.getElementById('sg-'+key);
  if(!grid) return;
  grid.innerHTML = '';
  if(!slots.length){
    grid.innerHTML = '<div class="no-slots">시간을 생성하거나 추가해 주세요</div>';
    return;
  }
  [...slots].sort().forEach(t=>{
    const bk = `${key}_${t}`;
    const isLocked = locked[bk];
    const isTaken = bookings[bk];
    const isBlocked = locked[bk+'_blocked'];
    let cls = 's-open', badge = '가능';
    if(isTaken){ cls='s-taken'; badge='예약'; }
    else if(isBlocked){ cls='s-blocked'; badge='연장'; }
    else if(isLocked){ cls='s-locked'; badge='잠금'; }

    const item = document.createElement('div');
    item.className = `slot-item ${cls}`;
    item.innerHTML = `<span class="st">${t}</span><span class="sb">${badge}</span>`;
    if(!isTaken && !isBlocked) item.onclick = ()=>toggleLock(key,t);
    if(!isTaken && !isBlocked){
      const x = document.createElement('button');
      x.className = 'del-x'; x.textContent = '×';
      x.onclick = e=>{ e.stopPropagation(); removeSlot(key,t); };
      item.appendChild(x);
    }
    grid.appendChild(item);
  });
}

function genSlots(key){
  const startVal = document.getElementById('gs-'+key).value.trim();
  const endVal = document.getElementById('ge-'+key).value.trim();
  if(!startVal||!endVal){ showToast('시작/종료 시간을 입력해 주세요'); return; }
  const parseTime = v => {
    const [h,m] = v.split(':').map(Number);
    if(isNaN(h)) return null;
    return h*60+(m||0);
  };
  const startMin = parseTime(startVal);
  const endMin = parseTime(endVal);
  if(startMin===null||endMin===null||startMin>=endMin){ showToast('올바른 시간을 입력해 주세요'); return; }
  const slots = [];
  for(let cur=startMin; cur<endMin; cur+=30){
    const h=Math.floor(cur/60); const m=cur%60;
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  }
  const data = ad();
  if(!data.slots) data.slots={};
  data.slots[key] = slots;
  sad(data); renderDays();
  showToast(`${slots.length}개 시간대 생성 완료`);
}

function toggleClose(key){
  const data = ad();
  if(!data.closedDays) data.closedDays={};
  data.closedDays[key] = !data.closedDays[key];
  sad(data); renderDays();
  showToast(data.closedDays[key]?'하루 전체 마감':'마감 해제');
}

function toggleLock(key,t){
  const data = ad();
  if(!data.locked) data.locked={};
  const bk = `${key}_${t}`;
  data.locked[bk] = !data.locked[bk];
  if(!data.locked[bk]) delete data.locked[bk];
  sad(data); renderDays();
}

function removeSlot(key,t){
  const data = ad();
  if(!data.slots?.[key]) return;
  data.slots[key] = data.slots[key].filter(s=>s!==t);
  sad(data); renderDays();
}

// ── 예약 내역 렌더 ──
function renderBookings(){
  const data = ad();
  const bookings = data.bookings || {};

  // 실시간 상담 분류
  const rt = [], others = [];
  Object.entries(bookings).forEach(([k,b])=>{
    if(b.menu==='실시간 리딩') rt.push({k,...b});
    else others.push({k,...b});
  });

  // 실시간: 날짜별 시간순 정렬
  const rtEl = document.getElementById('rtBookings');
  if(!rt.length){ rtEl.innerHTML='<div class="no-data">실시간 상담 예약이 없습니다</div>'; }
  else {
    const grouped = {};
    rt.forEach(b=>{
      const dk = b.k.split('_')[0];
      if(!grouped[dk]) grouped[dk]=[];
      grouped[dk].push(b);
    });
    rtEl.innerHTML = Object.keys(grouped).sort().map(dk=>{
      const dDate = new Date(dk);
      const dlabel = `${dDate.getMonth()+1}/${dDate.getDate()}(${['일','월','화','수','목','금','토'][dDate.getDay()]})`;
      const items = grouped[dk].sort((a,b)=>a.time?.localeCompare(b.time));
      return `<div class="bk-date-group">
        <div class="bk-date-label">${dlabel}</div>
        ${items.map(b=>`
          <div class="bk-item">
            <div class="bk-top">
              <span class="bk-time-badge">${b.time||'—'}</span>
              <span class="bk-name">${b.name||'—'}</span>
              <span class="bk-min">${b.dur?b.dur+'분':''}</span>
              <button class="bk-del" onclick="delBooking('${b.k}')">삭제</button>
            </div>
            <div class="bk-form-toggle">
              <span class="toggle-label">양식 수신:</span>
              <button class="toggle-btn ${b.formReceived?'recv':'not-recv'}" onclick="toggleForm('${b.k}')">${b.formReceived?'✓ 받음':'미수신'}</button>
            </div>
          </div>`).join('')}
      </div>`;
    }).join('');
  }

  // 그 외: 접수순 정렬
  const otherEl = document.getElementById('otherBookings');
  if(!others.length){ otherEl.innerHTML='<div class="no-data">예약 내역이 없습니다</div>'; }
  else {
    others.sort((a,b)=>(a.ts||0)-(b.ts||0));
    otherEl.innerHTML = others.map(b=>{
      const deadlineHtml = buildDeadline(b);
      return `<div class="bk-other">
        <div class="bko-top">
          <span class="bko-name">${b.name||'—'}</span>
          <span class="bko-menu">${b.menu||'—'}</span>
          <button class="bk-del" onclick="delBooking('${b.k}')">삭제</button>
        </div>
        <div style="font-size:.72rem;color:var(--text3);margin-bottom:8px;">접수: ${b.ts?new Date(b.ts).toLocaleString('ko-KR'):'-'} · ${(b.price||0).toLocaleString()}원</div>
        <div class="bko-recv-row">
          <span class="bko-recv-label">양식 수신 시간:</span>
          <input class="bko-recv-input" type="datetime-local" id="recv-${b.k}" value="${b.formRecvTime||''}" onchange="setRecvTime('${b.k}')">
          ${deadlineHtml}
        </div>
      </div>`;
    }).join('');
  }
}

function buildDeadline(b){
  const hours = MENU_DEADLINE[b.menuKey];
  if(!hours||!b.formRecvTime) return '';
  const recvDate = new Date(b.formRecvTime);
  const deadline = new Date(recvDate.getTime() + hours*3600000);
  const mo = deadline.getMonth()+1;
  const da = deadline.getDate();
  const hh = String(deadline.getHours()).padStart(2,'0');
  const mm = String(deadline.getMinutes()).padStart(2,'0');
  return `<span class="bko-deadline">→ ${mo}/${da} ${hh}:${mm}까지 전달</span>`;
}

function setRecvTime(k){
  const val = document.getElementById('recv-'+k)?.value;
  if(!val) return;
  const data = ad();
  if(data.bookings?.[k]) data.bookings[k].formRecvTime = val;
  sad(data); renderBookings();
}

function toggleForm(k){
  const data = ad();
  if(data.bookings?.[k]) data.bookings[k].formReceived = !data.bookings[k].formReceived;
  sad(data); renderBookings();
}

function delBooking(k){
  if(!confirm('예약을 삭제하시겠습니까?')) return;
  const data = ad();
  // 연속 블락 해제
  if(data.bookings?.[k]){
    const b = data.bookings[k];
    if(b.blockedKeys) b.blockedKeys.forEach(bk=>{ if(data.locked) delete data.locked[bk+'_blocked']; });
  }
  delete data.bookings[k];
  sad(data); renderBookings();
  showToast('삭제되었습니다');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}
</script>
</body>
</html>
